<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --wine:#7B1C2E;--wine2:#9B2438;--wine3:#5C1420;--wine-light:#F5E6E9;
  --bg:#F4F5F7;--bg2:#FFFFFF;--bg3:#F8F9FA;
  --sidebar:#1A0A0F;--sidebar2:#2A1018;--sidebar3:#3A1825;
  --text:#1A1A2E;--text2:#4A4A6A;--text3:#8A8AAA;
  --border:#E2E4EA;--border2:#D0D3DC;
  --green:#1A7A4A;--green-bg:#E8F5EE;--green-border:#A8D8BC;
  --amber:#B8660A;--amber-bg:#FEF3E2;--amber-border:#F0C070;
  --red:#C0392B;--red-bg:#FDECEC;--red-border:#F0A0A0;
  --blue:#1A5FAA;--blue-bg:#EAF1FB;--blue-border:#A0C0E8;
  --shadow:0 1px 4px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --shadow2:0 2px 8px rgba(0,0,0,.12);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;line-height:1.5}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:240px;background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid rgba(255,255,255,.06)}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px}
.logo-mark{width:38px;height:38px;background:var(--wine);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:#fff;letter-spacing:-1px;flex-shrink:0}
.logo-text{display:flex;flex-direction:column}
.logo-name{font-weight:700;font-size:15px;color:#fff;letter-spacing:.5px}
.logo-sub{font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px}
.nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-section-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:1.2px;padding:8px 10px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;color:rgba(255,255,255,.55);font-size:12.5px;font-weight:400;transition:all .15s;position:relative;margin-bottom:1px}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
.nav-item.active{background:var(--wine);color:#fff;font-weight:500}
.nav-item .nav-badge{margin-left:auto;background:var(--wine);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
.nav-item.active .nav-badge{background:rgba(255,255,255,.25)}
.nav-icon{width:16px;text-align:center;font-size:14px}
.sidebar-user{padding:12px 14px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.user-av{width:32px;height:32px;border-radius:50%;background:var(--wine);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:11px;color:#fff;flex-shrink:0;border:2px solid rgba(255,255,255,.15)}
.user-name-s{font-size:12px;font-weight:500;color:rgba(255,255,255,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role-s{font-size:10px;color:rgba(255,255,255,.35)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:12px;height:56px;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.topbar-title{font-size:16px;font-weight:600;color:var(--text);flex:1}
.topbar-right{display:flex;align-items:center;gap:8px}
.content{flex:1;overflow-y:auto;padding:24px}

/* BUTTONS */
.btn{padding:7px 15px;border-radius:7px;font-size:12.5px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn:active{transform:scale(.98)}
.btn-wine{background:var(--wine);color:#fff}
.btn-wine:hover{background:var(--wine2)}
.btn-ghost{background:#fff;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--bg3);border-color:var(--border2)}
.btn-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.btn-green:hover{background:#d4eddf}
.btn-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.btn-red:hover{background:#fad8d8}
.btn-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.btn-sm{padding:5px 10px;font-size:11.5px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:5px}
.btn-icon{padding:6px 8px;font-size:14px}

/* CARDS */
.card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:18px;box-shadow:var(--shadow)}
.card-sm{padding:14px}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px 18px;box-shadow:var(--shadow)}
.stat-label{font-size:11.5px;color:var(--text3);font-weight:500;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.stat-val{font-size:24px;font-weight:700;color:var(--text);line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:5px}
.stat-icon{font-size:22px;margin-bottom:8px}

/* GRID */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}

/* TABLE */
.table-wrap{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow)}
.table-toolbar{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
table{width:100%;border-collapse:collapse}
th{background:var(--bg3);padding:9px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 14px;font-size:12.5px;color:var(--text2);border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFBFC}
.td-name{color:var(--text)!important;font-weight:500}
.td-mono{font-family:monospace;font-size:12px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-wine{background:var(--wine-light);color:var(--wine)}
.badge-gray{background:#f0f0f5;color:var(--text3)}
.badge-dot::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}

/* SEMAPHORE */
.sem-green{color:var(--green);font-size:16px}
.sem-amber{color:var(--amber);font-size:16px}
.sem-red{color:var(--red);font-size:16px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:#fff;border-radius:12px;padding:0;width:560px;max-width:100%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-lg{width:720px}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-head-title{font-size:15px;font-weight:600;color:var(--text)}
.modal-body{padding:22px;overflow-y:auto;flex:1}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;background:var(--bg3)}
.close-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:2px 6px;border-radius:4px;line-height:1}
.close-btn:hover{background:var(--bg);color:var(--text)}

/* FORM */
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;display:block}
.form-input{width:100%;background:#fff;border:1px solid var(--border2);border-radius:7px;padding:8px 11px;font-size:13px;color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:border .15s}
.form-input:focus{border-color:var(--wine);box-shadow:0 0 0 3px rgba(123,28,46,.08)}
.form-input option{background:#fff}
textarea.form-input{resize:vertical;min-height:80px}

/* FILE UPLOADER */
.file-zone{border:1.5px dashed var(--border2);border-radius:8px;padding:18px;text-align:center;cursor:pointer;transition:all .15s;background:var(--bg3)}
.file-zone:hover{border-color:var(--wine);background:var(--wine-light)}
.file-zone-icon{font-size:24px;margin-bottom:6px;color:var(--text3)}
.file-zone-text{font-size:12.5px;color:var(--text3)}
.file-zone-sub{font-size:11px;color:var(--text3);margin-top:3px}
.file-chip{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11.5px;color:var(--text2);margin:3px 3px 0 0}
.file-chip .fc-name{max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-chip .fc-del{cursor:pointer;color:var(--red);font-size:13px;padding:0 2px}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:8px;padding:3px;margin-bottom:18px;border:1px solid var(--border)}
.tab-item{padding:6px 16px;border-radius:6px;font-size:12.5px;font-weight:400;color:var(--text2);cursor:pointer;transition:all .15s}
.tab-item.active{background:#fff;color:var(--wine);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* NOTIF PANEL */
.notif-drawer{position:fixed;right:0;top:0;bottom:0;width:360px;background:#fff;border-left:1px solid var(--border);z-index:150;display:flex;flex-direction:column;box-shadow:-4px 0 20px rgba(0,0,0,.12);transform:translateX(100%);transition:transform .25s}
.notif-drawer.open{transform:translateX(0)}
.notif-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.notif-body{flex:1;overflow-y:auto;padding:12px}
.notif-item{border-radius:8px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--border);cursor:pointer;transition:background .15s}
.notif-item:hover{background:var(--bg3)}
.notif-item.unread{border-left:3px solid var(--wine);background:var(--wine-light)}
.notif-cat{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.notif-msg{font-size:12.5px;color:var(--text);margin-bottom:4px;line-height:1.4}
.notif-time{font-size:11px;color:var(--text3)}

/* CONFIRM DIALOG */
.confirm-box{background:#fff;border-radius:12px;padding:28px;width:400px;max-width:95vw;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.confirm-icon{font-size:36px;margin-bottom:12px}
.confirm-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px}
.confirm-desc{font-size:13px;color:var(--text2);margin-bottom:22px;line-height:1.5}
.confirm-btns{display:flex;gap:10px;justify-content:center}

/* LOGIN */
.login-wrap{min-height:100vh;background:var(--sidebar);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:14px;padding:40px;width:380px;max-width:100%;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo-mark{width:60px;height:60px;background:var(--wine);border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:28px;color:#fff;margin-bottom:10px}
.login-logo-name{font-size:20px;font-weight:700;color:var(--text);letter-spacing:.5px}
.login-logo-sub{font-size:12px;color:var(--text3);margin-top:2px}
.login-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:24px}

/* SEARCH */
.search-row{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 11px}
.search-row input{background:none;border:none;outline:none;font-size:13px;color:var(--text);font-family:'Inter',sans-serif;width:200px}

/* MISC */
.divider{height:1px;background:var(--border);margin:16px 0}
.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.empty-text{font-size:14px}
.inline-actions{display:flex;gap:4px;align-items:center}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.activity-row{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.activity-row:last-child{border-bottom:none}
.act-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.tooltip{position:relative}
.tooltip:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;font-size:11px;padding:4px 8px;border-radius:5px;white-space:nowrap;pointer-events:none;z-index:300}
/* CHARTS */
.chart-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:18px;box-shadow:var(--shadow)}
.chart-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}
</style>

const {useState,useRef,useEffect}=React;

// Simple SVG bar chart - no external deps needed
function SimpleBarChart({data,keys,colors,height=180}){
  if(!data||!data.length)return <div style={{padding:20,color:'#999',textAlign:'center'}}>Sin datos</div>;
  const maxVal=Math.max(...data.flatMap(d=>keys.map(k=>Number(d[k])||0)),1);
  const W=360,H=height,pad=30,barW=Math.max(8,Math.floor((W-pad*2)/data.length/keys.length-4));
  const slotW=Math.floor((W-pad*2)/data.length);
  return(
    <svg viewBox={`0 0 ${W} ${H+40}`} style={{width:'100%',maxHeight:H+40}}>
      {[0,0.25,0.5,0.75,1].map(t=>(
        <line key={t} x1={pad} y1={H-(H-20)*t} x2={W-10} y2={H-(H-20)*t} stroke="#eee" strokeWidth="1"/>
      ))}
      {data.map((d,i)=>keys.map((k,ki)=>{
        const val=Number(d[k])||0;
        const bH=Math.max(2,Math.round((val/maxVal)*(H-20)));
        const x=pad+i*slotW+ki*(barW+3)+2;
        return(<g key={`${k}${i}`}>
          <rect x={x} y={H-bH} width={barW} height={bH} fill={colors[ki]||'#7B1C2E'} rx="2" opacity="0.85"/>
        </g>);
      }))}
      {data.map((d,i)=>(
        <text key={i} x={pad+i*slotW+slotW/2} y={H+14} textAnchor="middle" fontSize="9" fill="#888">
          {String(d.name||d.mes||'').slice(0,6)}
        </text>
      ))}
      {keys.map((k,i)=>(
        <g key={k}>
          <rect x={pad+i*80} y={H+24} width={10} height={8} fill={colors[i]||'#7B1C2E'} rx="1"/>
          <text x={pad+i*80+14} y={H+32} fontSize="9" fill="#666">{k}</text>
        </g>
      ))}
    </svg>
  );
}
function SimplePieChart({data,colors,height=180}){
  if(!data||!data.length)return <div style={{padding:20,color:'#999',textAlign:'center'}}>Sin datos</div>;
  const total=data.reduce((s,d)=>s+(Number(d.value)||0),0)||1;
  const cx=90,cy=80,r=65;let angle=-90;
  const slices=data.map((d,i)=>{
    const pct=(Number(d.value)||0)/total;
    const a=pct*360;
    const r1=angle*Math.PI/180;angle+=a;const r2=angle*Math.PI/180;
    const x1=cx+r*Math.cos(r1),y1=cy+r*Math.sin(r1);
    const x2=cx+r*Math.cos(r2),y2=cy+r*Math.sin(r2);
    const large=a>180?1:0;
    return{name:d.name,path:`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2}Z`,
      color:colors[i%colors.length],pct:Math.round(pct*100)};
  });
  return(
    <svg viewBox="0 0 280 190" style={{width:'100%',maxHeight:190}}>
      {slices.map((s,i)=><path key={i} d={s.path} fill={s.color} opacity="0.9" stroke="#fff" strokeWidth="2"/>)}
      {slices.map((s,i)=>(
        <g key={'l'+i}>
          <rect x={185} y={15+i*22} width={10} height={10} fill={s.color} rx="2"/>
          <text x={200} y={24+i*22} fontSize="9.5" fill="#444">{s.name} {s.pct}%</text>
        </g>
      ))}
    </svg>
  );
}

/* ─── HELPERS ─── */
const fmtMXN=(n)=>'$'+Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:0});
const today=()=>new Date().toISOString().slice(0,10);
const diasPara=(fecha)=>Math.ceil((new Date(fecha)-new Date())/86400000);
const semaforo=(dias)=>dias<0?'🔴':dias<=7?'🟡':'🟢';
const seColor=(dias)=>dias<0?'red':dias<=7?'amber':'green';
const hasAll=(perms)=>perms.includes('all');
const canDo=(user,perm)=>{
  const r=INIT_ROLES.find(r=>r.slug===user?.slug)||{perms:[]};
  return r.perms.includes('all')||r.perms.includes(perm);
};

function exportXLS(data,filename){
  const ws=XLSX.utils.json_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Datos');
  XLSX.writeFile(wb,filename+'.xlsx');
}

/* ─── FILE UPLOADER ─── */
function FileUploader({files=[],setFiles}){
  const ref=useRef();
  const add=(e)=>{
    const arr=Array.from(e.target.files).map(f=>({
      id:Date.now()+Math.random(),name:f.name,size:f.size,type:f.type,
      url:URL.createObjectURL(f)
    }));
    setFiles([...files,...arr]);
  };
  const ext=(name)=>name.split('.').pop().toLowerCase();
  const icon=(name)=>['jpg','jpeg','png'].includes(ext(name))?'🖼️':'📄';
  return(
    <div>
      <div className="file-zone" onClick={()=>ref.current.click()}>
        <div className="file-zone-icon">📎</div>
        <div className="file-zone-text">Adjuntar archivos o imágenes</div>
        <div className="file-zone-sub">PDF, JPG, PNG, JPEG, XML</div>
        <input ref={ref} type="file" multiple accept="image/*,.pdf,.xml,.xlsx" style={{display:'none'}} onChange={add}/>
      </div>
      {files.length>0&&<div style={{marginTop:8,display:'flex',flexWrap:'wrap'}}>
        {files.map((f,i)=>(
          <span key={f.id||i} className="file-chip">
            {icon(f.name)}&nbsp;
            <span className="fc-name">{f.name}</span>
            {f.url&&<a href={f.url} target="_blank" rel="noreferrer" style={{color:'var(--blue)',fontSize:11,textDecoration:'none',marginLeft:4}} title="Ver">👁</a>}
            <span className="fc-del" onClick={()=>setFiles(files.filter((_,j)=>j!==i))}>×</span>
          </span>
        ))}
      </div>}
    </div>
  );
}

/* ─── NOTIF PANEL ─── */
function NotifPanel({open,onClose,notifs,setNotifs,currentUser,onNavigate,gastos,compras,pagos,facturas,inventario}){
  const slug=currentUser?.slug||'director';
  const liveNotifs=[];
  if(pagos) pagos.filter(p=>p.estado==='Pendiente').forEach(p=>liveNotifs.push({
    id:'p'+p.id,tipo:'pago',msg:`Pago pendiente: ${p.proveedor}`,sub:`${fmtMXN(p.monto)} — requiere autorización`,
    time:'Pendiente',leida:false,para:['director','operaciones'],prioridad:'alta',nav:{page:'finanzas',tab:'pagos'}
  }));
  if(gastos) gastos.filter(g=>g.estado==='Pendiente').forEach(g=>liveNotifs.push({
    id:'g'+g.id,tipo:'gasto',msg:`Gasto pendiente: ${g.desc}`,sub:`${fmtMXN(g.monto)} — solicitado por ${g.solicitante||''}`,
    time:'Pendiente',leida:false,para:['director','operaciones'],prioridad:'alta',nav:{page:'finanzas',tab:'gastos'}
  }));
  if(compras) compras.filter(c=>c.estado==='Pendiente').forEach(c=>liveNotifs.push({
    id:'c'+c.id,tipo:'compra',msg:`Compra pendiente: ${c.desc}`,sub:`${fmtMXN(c.monto)} — ${c.proveedor}`,
    time:'Pendiente',leida:false,para:['director','operaciones'],prioridad:'alta',nav:{page:'finanzas',tab:'compras'}
  }));
  if(facturas) facturas.filter(f=>f.estado==='Vencida').forEach(f=>liveNotifs.push({
    id:'f'+f.id,tipo:'factura',msg:`Factura vencida: ${f.cliente}`,sub:`${f.folio} — ${fmtMXN(f.total)}`,
    time:'Vencida',leida:false,para:['director','operaciones','secretaria'],prioridad:'alta',nav:{page:'finanzas',tab:'facturas'}
  }));
  if(inventario) inventario.filter(i=>i.existencia<=i.minimo).forEach(i=>liveNotifs.push({
    id:'i'+i.id,tipo:'inventario',msg:`Stock bajo: ${i.producto}`,sub:`${i.existencia} uds — mínimo requerido: ${i.minimo}`,
    time:'Alerta',leida:false,para:['director','operaciones'],prioridad:'media',nav:{page:'inventario',tab:null}
  }));
  const manualMine=notifs.filter(n=>n.para.includes(slug)&&!liveNotifs.find(l=>l.id===n.id));
  const allMine=[...liveNotifs.filter(n=>n.para.includes(slug)),...manualMine];
  const unread=allMine.filter(n=>!n.leida).length;
  const markAll=()=>setNotifs(notifs.map(n=>({...n,leida:true})));
  const handleClick=(n)=>{
    if(n.nav&&onNavigate)onNavigate(n.nav.page,n.nav.tab);
    setNotifs(notifs.map(x=>x.id===n.id?{...x,leida:true}:x));
    onClose();
  };
  const typeIcon={pago:'💳',gasto:'💸',compra:'🛒',factura:'🧾',inventario:'📦'};
  const typeColor={pago:'var(--wine)',gasto:'var(--amber)',compra:'var(--blue)',factura:'var(--red)',inventario:'#B8660A'};
  const typeLabel={pago:'Pago pendiente',gasto:'Gasto pendiente',compra:'Compra pendiente',factura:'Factura vencida',inventario:'Stock bajo'};
  return(
    <div className={'notif-drawer'+(open?' open':'')}>
      <div className="notif-head">
        <div style={{fontWeight:600,fontSize:15,color:'var(--text)',display:'flex',alignItems:'center',gap:8}}>
          🔔 Notificaciones
          {unread>0&&<span style={{background:'var(--wine)',color:'#fff',fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:10}}>{unread}</span>}
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <button className="btn btn-ghost btn-sm" onClick={markAll}>Leer todas</button>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
      </div>
      <div className="notif-body">
        {allMine.length===0&&<div className="empty-state"><div className="empty-icon">🔔</div><div className="empty-text">Sin notificaciones pendientes</div></div>}
        {allMine.map((n,i)=>(
          <div key={n.id||i} className={'notif-item'+(n.leida?'':' unread')} onClick={()=>handleClick(n)} style={{cursor:'pointer'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
              <span className="notif-cat" style={{color:typeColor[n.tipo]||'var(--text2)'}}>
                {typeIcon[n.tipo]||'ℹ️'} {typeLabel[n.tipo]||'Notificación'}
              </span>
              {n.prioridad==='alta'&&<span style={{background:'var(--red)',color:'#fff',fontSize:9,fontWeight:700,padding:'2px 6px',borderRadius:8}}>URGENTE</span>}
            </div>
            <div className="notif-msg">{n.msg}</div>
            {n.sub&&<div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{n.sub}</div>}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:5}}>
              <div className="notif-time">{n.time}</div>
              {n.nav&&<span style={{fontSize:10,color:'var(--wine)',fontWeight:600}}>Ir a revisar →</span>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

const WINE='#7B1C2E';
const chartColors=['#7B1C2E','#1A7A4A','#1A5FAA','#B8660A','#C0392B','#6B3FA0'];

function Dashboard({cu,gastos,compras,cobros,clientes,inventario,facturas,actividades}){
  const slug=cu?.slug||'director';
  const totalCobrar=cobros.filter(c=>c.estado!=='Cobrado').reduce((s,c)=>s+c.saldo,0);
  const totalPagar=pagosGlob.filter(p=>p.estado==='Pendiente').reduce((s,p)=>s+p.monto,0);
  const gastPend=gastos.filter(g=>g.estado==='Pendiente').length;
  const compPend=compras.filter(c=>c.estado==='Pendiente').length;
  const invBajo=inventario.filter(i=>i.existencia<=i.minimo).length;
  const factVenc=facturas.filter(f=>f.estado==='Vencida').length;
  const factPend=facturas.filter(f=>f.estado==='Pendiente').length;
  const clActivos=clientes.filter(c=>['Lead','Propuesta','Negociación'].includes(c.etapa)).length;

  // Chart data
  const meses=['Ene','Feb','Mar','Abr','May','Jun'];
  const ingresosData=meses.map((m,i)=>({mes:m,Ingresos:Math.round(20000+Math.random()*60000),Egresos:Math.round(10000+Math.random()*40000)}));
  ingresosData[5]={mes:'Jun',Ingresos:cobros.filter(c=>c.estado==='Cobrado').reduce((s,c)=>s+c.cobrado,0)||38000,Egresos:gastos.filter(g=>g.estado==='Aprobado').reduce((s,g)=>s+g.monto,0)||22000};
  
  const factStates=[
    {name:'Pendiente',value:facturas.filter(f=>f.estado==='Pendiente').length||1},
    {name:'Pagada',value:facturas.filter(f=>f.estado==='Pagada').length||0},
    {name:'Vencida',value:facturas.filter(f=>f.estado==='Vencida').length||1},
    {name:'Parcial',value:facturas.filter(f=>f.estado==='Parcialmente pagada').length||1},
  ].filter(x=>x.value>0);
  const factColors=['#1A5FAA','#1A7A4A','#C0392B','#B8660A'];

  const cobranzaData=cobros.map(c=>({name:c.cliente.split(' ')[0],Cobrado:c.cobrado,Pendiente:c.saldo}));

  const pipelineData=['Lead','Propuesta','Negociación','Cliente','Perdido'].map(e=>({
    etapa:e,Clientes:clientes.filter(c=>c.etapa===e).length
  })).filter(x=>x.Clientes>0);

  const actByType=['llamada','correo','visita','nota'].map(t=>({
    name:t.charAt(0).toUpperCase()+t.slice(1),
    value:actividades.filter(a=>a.tipo===t).length||0
  })).filter(x=>x.value>0);
  const actColors=['#1A5FAA','#7B1C2E','#1A7A4A','#B8660A'];

  const compraStates=[
    {name:'Aprobadas',value:compras.filter(c=>c.estado==='Aprobado').length||1},
    {name:'Pendientes',value:compras.filter(c=>c.estado==='Pendiente').length||2},
    {name:'Rechazadas',value:compras.filter(c=>c.estado==='Rechazado').length||0},
  ].filter(x=>x.value>0);
  const compColors=['#1A7A4A','#B8660A','#C0392B'];

  const invData=inventario.map(i=>({name:i.producto.split(' ')[0],Existencia:i.existencia,Mínimo:i.minimo}));

  if(slug==='ventas') return(
    <div>
      <div className="grid4" style={{marginBottom:18}}>
        {[
          {label:'Prospectos activos',val:clientes.filter(c=>c.etapa!=='Cliente'&&c.etapa!=='Perdido').length,icon:'👥',color:'var(--wine)'},
          {label:'Clientes ganados',val:clientes.filter(c=>c.etapa==='Cliente').length,icon:'✅',color:'var(--green)'},
          {label:'En negociación',val:clientes.filter(c=>c.etapa==='Negociación').length,icon:'🤝',color:'var(--amber)'},
          {label:'Valor potencial',val:fmtMXN(clientes.reduce((s,c)=>s+c.valor,0)),icon:'💰',color:'var(--blue)'},
        ].map((s,i)=>(
          <div key={i} className="stat-card">
            <div className="stat-icon">{s.icon}</div>
            <div className="stat-label">{s.label}</div>
            <div className="stat-val" style={{color:s.color,fontSize:20}}>{s.val}</div>
          </div>
        ))}
      </div>
      <div className="charts-grid">
        <div className="chart-card">
          <div className="chart-title">📊 Pipeline de Ventas</div>
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={pipelineData}><CartesianGrid strokeDasharray="3 3" stroke="#eee"/>
              <XAxis dataKey="etapa" tick={{fontSize:11}}/><YAxis tick={{fontSize:11}}/>
              <Tooltip/><Bar dataKey="Clientes" fill={WINE} radius={[4,4,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div className="chart-card">
          <div className="chart-title">🎯 Actividades por Tipo</div>
          <ResponsiveContainer width="100%" height={220}>
            <PieChart><Pie data={actByType.length?actByType:[{name:'Sin datos',value:1}]} cx="50%" cy="50%" outerRadius={80} dataKey="value" label={({name,value})=>`${name}: ${value}`}>
              {actByType.map((_,i)=><Cell key={i} fill={actColors[i%actColors.length]}/>)}
            </Pie><Tooltip/><Legend/></PieChart>
          </ResponsiveContainer>
        </div>
      </div>
      <div className="card" style={{marginTop:16}}>
        <div style={{fontWeight:600,fontSize:13,marginBottom:12}}>Próximas actividades</div>
        {actividades.slice(0,4).map(a=>(
          <div key={a.id} className="activity-row">
            <div className="act-icon" style={{background:a.tipo==='llamada'?'#EAF1FB':a.tipo==='correo'?'var(--wine-light)':a.tipo==='visita'?'var(--green-bg)':'var(--amber-bg)'}}>
              {a.tipo==='llamada'?'📞':a.tipo==='correo'?'✉️':a.tipo==='visita'?'🤝':'📝'}
            </div>
            <div>
              <div style={{fontSize:13,fontWeight:500,color:'var(--text)'}}>{a.desc}</div>
              <div style={{fontSize:11,color:'var(--text3)'}}>{clientes.find(c=>c.id===a.clienteId)?.nombre} · {a.fecha} {a.hora}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  if(slug==='secretaria') return(
    <div>
      <div className="grid4" style={{marginBottom:18}}>
        {[
          {label:'Facturas pendientes',val:factPend,icon:'🧾',color:'var(--amber)'},
          {label:'Facturas vencidas',val:factVenc,icon:'⚠️',color:'var(--red)'},
          {label:'Por cobrar',val:fmtMXN(totalCobrar),icon:'💰',color:'var(--wine)'},
          {label:'Pagos pendientes',val:pagosGlob.filter(p=>p.estado==='Pendiente').length,icon:'💳',color:'var(--blue)'},
        ].map((s,i)=>(
          <div key={i} className="stat-card">
            <div className="stat-icon">{s.icon}</div>
            <div className="stat-label">{s.label}</div>
            <div className="stat-val" style={{color:s.color,fontSize:20}}>{s.val}</div>
          </div>
        ))}
      </div>
      <div className="charts-grid">
        <div className="chart-card">
          <div className="chart-title">🧾 Estado de Facturas</div>
          <ResponsiveContainer width="100%" height={220}>
            <PieChart><Pie data={factStates} cx="50%" cy="50%" outerRadius={80} dataKey="value" label={({name,value})=>`${name}: ${value}`}>
              {factStates.map((_,i)=><Cell key={i} fill={factColors[i%factColors.length]}/>)}
            </Pie><Tooltip/><Legend/></PieChart>
          </ResponsiveContainer>
        </div>
        <div className="chart-card">
          <div className="chart-title">💰 Cobranza por Cliente</div>
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={cobranzaData}><CartesianGrid strokeDasharray="3 3" stroke="#eee"/>
              <XAxis dataKey="name" tick={{fontSize:11}}/><YAxis tick={{fontSize:11}}/>
              <Tooltip formatter={v=>fmtMXN(v)}/><Legend/>
              <Bar dataKey="Cobrado" fill="#1A7A4A" radius={[4,4,0,0]}/>
              <Bar dataKey="Pendiente" fill="#C0392B" radius={[4,4,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>
    </div>
  );

  if(slug==='operaciones') return(
    <div>
      <div className="grid4" style={{marginBottom:18}}>
        {[
          {label:'Compras pendientes',val:compPend,icon:'🛒',color:'var(--amber)'},
          {label:'Pagos por aprobar',val:pagosGlob.filter(p=>p.estado==='Pendiente').length,icon:'✅',color:'var(--wine)'},
          {label:'Inventario bajo',val:invBajo,icon:'📦',color:'var(--red)'},
          {label:'Gastos pendientes',val:gastPend,icon:'💸',color:'var(--blue)'},
        ].map((s,i)=>(
          <div key={i} className="stat-card">
            <div className="stat-icon">{s.icon}</div>
            <div className="stat-label">{s.label}</div>
            <div className="stat-val" style={{color:s.color,fontSize:20}}>{s.val}</div>
          </div>
        ))}
      </div>
      <div className="charts-grid">
        <div className="chart-card">
          <div className="chart-title">🛒 Estado de Compras</div>
          <ResponsiveContainer width="100%" height={220}>
            <PieChart><Pie data={compraStates} cx="50%" cy="50%" outerRadius={80} dataKey="value" label={({name,value})=>`${name}: ${value}`}>
              {compraStates.map((_,i)=><Cell key={i} fill={compColors[i]}/>)}
            </Pie><Tooltip/><Legend/></PieChart>
          </ResponsiveContainer>
        </div>
        <div className="chart-card">
          <div className="chart-title">📦 Inventario: Existencia vs Mínimo</div>
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={invData}><CartesianGrid strokeDasharray="3 3" stroke="#eee"/>
              <XAxis dataKey="name" tick={{fontSize:11}}/><YAxis tick={{fontSize:11}}/>
              <Tooltip/><Legend/>
              <Bar dataKey="Existencia" fill={WINE} radius={[4,4,0,0]}/>
              <Bar dataKey="Mínimo" fill="#8A8AAA" radius={[4,4,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>
    </div>
  );

  // Director General
  return(
    <div>
      <div className="grid5" style={{marginBottom:18}}>
        {[
          {label:'Por cobrar',val:fmtMXN(totalCobrar),icon:'💰',color:'var(--wine)'},
          {label:'Por pagar',val:fmtMXN(totalPagar),icon:'💳',color:'var(--red)'},
          {label:'Facturas vencidas',val:factVenc,icon:'⚠️',color:'var(--red)'},
          {label:'Prospectos activos',val:clActivos,icon:'👥',color:'var(--blue)'},
          {label:'Stock bajo',val:invBajo,icon:'📦',color:'var(--amber)'},
        ].map((s,i)=>(
          <div key={i} className="stat-card">
            <div className="stat-icon">{s.icon}</div>
            <div className="stat-label">{s.label}</div>
            <div className="stat-val" style={{color:s.color,fontSize:19}}>{s.val}</div>
          </div>
        ))}
      </div>
      <div className="charts-grid" style={{marginBottom:16}}>
        <div className="chart-card">
          <div className="chart-title">📈 Ingresos vs Egresos (6 meses)</div>
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={ingresosData}><CartesianGrid strokeDasharray="3 3" stroke="#eee"/>
              <XAxis dataKey="mes" tick={{fontSize:11}}/><YAxis tick={{fontSize:11}} tickFormatter={v=>v>=1000?`$${(v/1000).toFixed(0)}k`:v}/>
              <Tooltip formatter={v=>fmtMXN(v)}/><Legend/>
              <Bar dataKey="Ingresos" fill="#1A7A4A" radius={[4,4,0,0]}/>
              <Bar dataKey="Egresos" fill="#C0392B" radius={[4,4,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div className="chart-card">
          <div className="chart-title">🧾 Estado de Facturas</div>
          <ResponsiveContainer width="100%" height={220}>
            <PieChart><Pie data={factStates} cx="50%" cy="50%" outerRadius={80} dataKey="value" label={({name,value})=>`${name}: ${value}`}>
              {factStates.map((_,i)=><Cell key={i} fill={factColors[i%factColors.length]}/>)}
            </Pie><Tooltip/><Legend/></PieChart>
          </ResponsiveContainer>
        </div>
        <div className="chart-card">
          <div className="chart-title">💰 Cobranza por Cliente</div>
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={cobranzaData}><CartesianGrid strokeDasharray="3 3" stroke="#eee"/>
              <XAxis dataKey="name" tick={{fontSize:11}}/><YAxis tick={{fontSize:11}}/>
              <Tooltip formatter={v=>fmtMXN(v)}/><Legend/>
              <Bar dataKey="Cobrado" fill="#1A7A4A" radius={[4,4,0,0]}/>
              <Bar dataKey="Pendiente" fill="#C0392B" radius={[4,4,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div className="chart-card">
          <div className="chart-title">👥 Pipeline de Ventas</div>
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={pipelineData} layout="vertical">
              <CartesianGrid strokeDasharray="3 3" stroke="#eee"/>
              <XAxis type="number" tick={{fontSize:11}}/>
              <YAxis dataKey="etapa" type="category" tick={{fontSize:11}} width={80}/>
              <Tooltip/><Bar dataKey="Clientes" fill={WINE} radius={[0,4,4,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>
    </div>
  );
}

}

/* ─── CRM MODULE ─── */
function CRMModule({clientes,setClientes,actividades,setActividades,cu}){
  const [tab,setTab]=useState('clientes');
  const [modal,setModal]=useState(null);
  const [actModal,setActModal]=useState(false);
  const [detalle,setDetalle]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const [search,setSearch]=useState('');
  const blankC={nombre:'',contacto:'',email:'',tel:'',ciudad:'',etapa:'Lead',valor:'',rfc:'',files:[]};
  const blankA={clienteId:'',tipo:'llamada',desc:'',fecha:today(),hora:'09:00'};
  const [fC,setFC]=useState(blankC);
  const [fA,setFA]=useState(blankA);
  const isNew=modal?.mode==='new';

  const openEdit=(c)=>{setFC({...c});setModal({mode:'edit',id:c.id})};
  const saveCliente=()=>{
    if(!fC.nombre)return;
    if(isNew)setClientes([{id:Date.now(),...fC,valor:Number(fC.valor)||0},...clientes]);
    else setClientes(clientes.map(c=>c.id===modal.id?{...fC,valor:Number(fC.valor)||0}:c));
    setModal(null);setFC(blankC);
  };
  const delCliente=(id)=>setConfirm({msg:'¿Eliminar este cliente/prospecto?',onOk:()=>{setClientes(clientes.filter(c=>c.id!==id));setConfirm(null);setDetalle(null);}});
  const saveAct=()=>{
    if(!fA.desc||!fA.clienteId)return;
    setActividades([{id:Date.now(),...fA,clienteId:Number(fA.clienteId),usuario:cu?.name||'Usuario'},...actividades]);
    setActModal(false);setFA(blankA);
  };
  const delAct=(id)=>setConfirm({msg:'¿Eliminar esta actividad?',onOk:()=>{setActividades(actividades.filter(a=>a.id!==id));setConfirm(null);}});
  const etapaColor={Lead:'blue',Propuesta:'amber',Negociación:'purple',Cliente:'green',Perdido:'red'};
  const filt=clientes.filter(c=>c.nombre.toLowerCase().includes(search.toLowerCase())||c.contacto.toLowerCase().includes(search.toLowerCase()));
  const exC=clientes.map(c=>({Empresa:c.nombre,Contacto:c.contacto,Email:c.email,Tel:c.tel,Ciudad:c.ciudad,Etapa:c.etapa,Valor:c.valor,RFC:c.rfc}));
  const exA=actividades.map(a=>{const cl=clientes.find(c=>c.id===a.clienteId);return{Cliente:cl?.nombre,Tipo:a.tipo,Descripción:a.desc,Fecha:a.fecha,Hora:a.hora,Usuario:a.usuario};});

  return(
    <div>
      <div className="tabs">
        {['clientes','actividades'].map(t=><div key={t} className={'tab-item'+(tab===t?' active':'')} onClick={()=>setTab(t)} style={{textTransform:'capitalize'}}>{t}</div>)}
      </div>

      {tab==='clientes'&&<>
        <div className="table-wrap">
          <div className="table-toolbar">
            <div className="search-row"><span>🔍</span><input placeholder="Buscar..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
            <button className="btn btn-wine" onClick={()=>{setFC(blankC);setModal({mode:'new'})}}>+ Nuevo</button>
            <button className="btn btn-ghost" onClick={()=>exportXLS(exC,'clientes_crm')}>📊 Excel</button>
          </div>
          <table>
            <thead><tr><th>Empresa</th><th>Contacto</th><th>Ciudad</th><th>Etapa</th><th>Valor</th><th>Actividades</th><th>Acciones</th></tr></thead>
            <tbody>
              {filt.map(c=>(
                <tr key={c.id}>
                  <td className="td-name" style={{cursor:'pointer'}} onClick={()=>setDetalle(c)}>{c.nombre}</td>
                  <td>{c.contacto}</td>
                  <td>{c.ciudad}</td>
                  <td><span className={`badge badge-${etapaColor[c.etapa]||'gray'} badge-dot`}>{c.etapa}</span></td>
                  <td className="td-mono">{c.valor>0?fmtMXN(c.valor):'—'}</td>
                  <td>{actividades.filter(a=>a.clienteId===c.id).length}</td>
                  <td><div className="inline-actions">
                    <button className="btn btn-ghost btn-xs" onClick={()=>openEdit(c)}>✏️</button>
                    <button className="btn btn-ghost btn-xs" onClick={()=>delCliente(c.id)}>🗑</button>
                  </div></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </>}

      {tab==='actividades'&&<>
        <div className="table-wrap">
          <div className="table-toolbar">
            <button className="btn btn-wine" onClick={()=>setActModal(true)}>+ Nueva actividad</button>
            <button className="btn btn-ghost" onClick={()=>exportXLS(exA,'actividades')}>📊 Excel</button>
          </div>
          <div style={{padding:'4px 0'}}>
            {actividades.map(a=>{
              const cl=clientes.find(c=>c.id===a.clienteId);
              return(
                <div key={a.id} className="activity-row" style={{padding:'12px 16px'}}>
                  <div className="act-icon" style={{background:a.tipo==='llamada'?'var(--blue-bg)':a.tipo==='correo'?'var(--wine-light)':a.tipo==='visita'?'var(--green-bg)':'var(--amber-bg)'}}>
                    {a.tipo==='llamada'?'📞':a.tipo==='correo'?'✉️':a.tipo==='visita'?'🤝':'📝'}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:500,fontSize:13,color:'var(--text)'}}>{a.desc}</div>
                    <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{cl?.nombre||'Sin cliente'} · {a.fecha} {a.hora} · {a.usuario}</div>
                  </div>
                  <div className="inline-actions">
                    <span className={`badge badge-${a.tipo==='llamada'?'blue':a.tipo==='correo'?'wine':a.tipo==='visita'?'green':'amber'}`} style={{fontSize:10}}>{a.tipo}</span>
                    <button className="btn btn-ghost btn-xs" onClick={()=>delAct(a.id)}>🗑</button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </>}

      {/* Detalle cliente */}
      {detalle&&<div className="modal-overlay">
        <div className="modal modal-lg">
          <div className="modal-head">
            <div className="modal-head-title">{detalle.nombre}</div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>{openEdit(detalle);setDetalle(null)}}>✏️ Editar</button>
              <button className="close-btn" onClick={()=>setDetalle(null)}>×</button>
            </div>
          </div>
          <div className="modal-body">
            <div className="grid2" style={{marginBottom:16}}>
              {[['Contacto',detalle.contacto],['Email',detalle.email],['Teléfono',detalle.tel],['Ciudad',detalle.ciudad],['RFC',detalle.rfc],['Etapa',detalle.etapa]].map(([k,v])=>(
                <div key={k}><div className="form-label">{k}</div><div style={{fontSize:13,color:'var(--text)',fontWeight:500}}>{v||'—'}</div></div>
              ))}
            </div>
            <div className="divider"/>
            <div style={{fontWeight:600,fontSize:13,marginBottom:10}}>Historial de actividades</div>
            {actividades.filter(a=>a.clienteId===detalle.id).map(a=>(
              <div key={a.id} className="activity-row">
                <div className="act-icon" style={{background:'var(--wine-light)'}}>
                  {a.tipo==='llamada'?'📞':a.tipo==='correo'?'✉️':a.tipo==='visita'?'🤝':'📝'}
                </div>
                <div>
                  <div style={{fontWeight:500,fontSize:12.5}}>{a.desc}</div>
                  <div style={{fontSize:11,color:'var(--text3)'}}>{a.tipo} · {a.fecha} {a.hora}</div>
                </div>
              </div>
            ))}
            {actividades.filter(a=>a.clienteId===detalle.id).length===0&&<div style={{color:'var(--text3)',fontSize:13}}>Sin actividades</div>}
          </div>
        </div>
      </div>}

      {/* Modal cliente */}
      {modal&&<div className="modal-overlay">
        <div className="modal">
          <div className="modal-head">
            <div className="modal-head-title">{isNew?'Nuevo Cliente/Prospecto':'Editar Cliente'}</div>
            <button className="close-btn" onClick={()=>setModal(null)}>×</button>
          </div>
          <div className="modal-body">
            <div className="grid2">
              <div className="form-group"><label className="form-label">Empresa *</label><input className="form-input" value={fC.nombre} onChange={e=>setFC({...fC,nombre:e.target.value})}/></div>
              <div className="form-group"><label className="form-label">RFC</label><input className="form-input" value={fC.rfc} onChange={e=>setFC({...fC,rfc:e.target.value})}/></div>
            </div>
            <div className="grid2">
              <div className="form-group"><label className="form-label">Contacto</label><input className="form-input" value={fC.contacto} onChange={e=>setFC({...fC,contacto:e.target.value})}/></div>
              <div className="form-group"><label className="form-label">Teléfono</label><input className="form-input" value={fC.tel} onChange={e=>setFC({...fC,tel:e.target.value})}/></div>
            </div>
            <div className="grid2">
              <div className="form-group"><label className="form-label">Email</label><input className="form-input" type="email" value={fC.email} onChange={e=>setFC({...fC,email:e.target.value})}/></div>
              <div className="form-group"><label className="form-label">Ciudad</label><input className="form-input" value={fC.ciudad} onChange={e=>setFC({...fC,ciudad:e.target.value})}/></div>
            </div>
            <div className="grid2">
              <div className="form-group"><label className="form-label">Etapa</label>
                <select className="form-input" value={fC.etapa} onChange={e=>setFC({...fC,etapa:e.target.value})}>
                  {['Lead','Propuesta','Negociación','Cliente','Perdido'].map(e=><option key={e}>{e}</option>)}
                </select>
              </div>
              <div className="form-group"><label className="form-label">Valor potencial (MXN)</label><input className="form-input" type="number" value={fC.valor} onChange={e=>setFC({...fC,valor:e.target.value})}/></div>
            </div>
            <div className="form-group"><label className="form-label">Documentos / Contratos</label><FileUploader files={fC.files} setFiles={f=>setFC({...fC,files:f})}/></div>
          </div>
          <div className="modal-foot">
            <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancelar</button>

function PagosTab({pagos,setPagos,canApprove,cu,addNotif}){
  const [modal,setModal]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const blank={proveedor:'',concepto:'',monto:'',fecha:today(),estado:'Pendiente',metodo:'Transferencia',files:[],aprobadoPor:''};
  const [f,setF]=useState(blank);
  const isNew=modal?.mode==='new';
  const save=()=>{
    if(!f.proveedor||!f.monto)return;
    if(isNew){
      setPagos([{id:Date.now(),...f,monto:Number(f.monto)},...pagos]);
      addNotif({tipo:'pago',msg:`Nueva solicitud de pago: ${f.proveedor} – ${fmtMXN(f.monto)} – requiere autorización`,time:'Ahora',leida:false,para:['director','operaciones'],prioridad:'alta'});
    } else setPagos(pagos.map(x=>x.id===modal.id?{...x,...f,monto:Number(f.monto)}:x));
    setModal(null);setF(blank);
  };
  const approve=(id)=>setPagos(pagos.map(x=>x.id===id?{...x,estado:'Pagado',aprobadoPor:cu?.name}:x));
  const reject=(id)=>setPagos(pagos.map(x=>x.id===id?{...x,estado:'Rechazado'}:x));
  const del=(id)=>setConfirm({msg:'¿Eliminar este pago?',onOk:()=>{setPagos(pagos.filter(x=>x.id!==id));setConfirm(null);}});
  const exData=pagos.map(x=>({Proveedor:x.proveedor,Concepto:x.concepto,Monto:x.monto,Fecha:x.fecha,Estado:x.estado,Método:x.metodo,AprobadoPor:x.aprobadoPor}));
  return(
    <div>
      {!canApprove&&<div style={{background:'var(--amber-bg)',border:'1px solid var(--amber-border)',borderRadius:8,padding:'10px 14px',marginBottom:14,fontSize:12.5,color:'var(--amber)',display:'flex',gap:8,alignItems:'center'}}>

      <div className="table-wrap">
        <div className="table-toolbar">
          <button className="btn btn-wine" onClick={()=>{setF(blank);setModal({mode:'new'})}}>+ Nuevo pago</button>
          <button className="btn btn-ghost" onClick={()=>exportXLS(exData,'pagos')}>📊 Excel</button>
        </div>
        <table>
          <thead><tr><th>Proveedor</th><th>Concepto</th><th>Monto</th><th>Fecha</th><th>Método</th><th>Estado</th><th>Archivos</th>{canApprove&&<th>Autorización</th>}<th>Acciones</th></tr></thead>
          <tbody>
            {pagos.map(x=>(
              <tr key={x.id}>
                <td className="td-name">{x.proveedor}</td>
                <td>{x.concepto}</td>
                <td className="td-mono" style={{fontWeight:600}}>{fmtMXN(x.monto)}</td>
                <td>{x.fecha}</td>
                <td>{x.metodo}</td>
                <td><span className={`badge badge-${x.estado==='Pagado'?'green':x.estado==='Rechazado'?'red':'amber'} badge-dot`}>{x.estado}</span></td>
                <td style={{fontSize:12}}>{x.files?.length>0?`📎 ${x.files.length}`:'—'}</td>
                {canApprove&&<td><div className="inline-actions">
                  {x.estado==='Pendiente'&&<>
                    <button className="btn btn-green btn-xs" onClick={()=>approve(x.id)}>✓ Aprobar</button>
                    <button className="btn btn-red btn-xs" onClick={()=>reject(x.id)}>✗</button>
                  </>}
                  {x.estado!=='Pendiente'&&<span style={{fontSize:11,color:'var(--text3)'}}>{x.aprobadoPor||'—'}</span>}
                </div></td>}
                <td><div className="inline-actions">
                  <button className="btn btn-ghost btn-xs" onClick={()=>{setF({...x});setModal({mode:'edit',id:x.id})}}>✏️</button>
                  <button className="btn btn-ghost btn-xs" onClick={()=>del(x.id)}>🗑</button>
                </div></td>

      </div>

          <div className="modal-body">
            {isNew&&<div style={{background:'var(--wine-light)',border:'1px solid #d4a0aa',borderRadius:8,padding:'10px 14px',marginBottom:14,fontSize:12,color:'var(--wine)'}}>
              🔒 Esta solicitud se enviará a Director General y Operaciones para autorización.

              <div className="form-group"><label className="form-label">Monto (MXN) *</label><input className="form-input" type="number" value={f.monto} onChange={e=>setF({...f,monto:e.target.value})}/></div>

  );
}

/* ─── INVENTARIO ─── */
function InventarioModule({inventario,setInventario}){
  const [modal,setModal]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const blank={producto:'',sku:'',categoria:'Equipo',existencia:'',minimo:'',costo:'',precio:''};
  const [f,setF]=useState(blank);
  const isNew=modal?.mode==='new';
  const save=()=>{
    const rec={...f,existencia:Number(f.existencia)||0,minimo:Number(f.minimo)||0,costo:Number(f.costo)||0,precio:Number(f.precio)||0};
    if(isNew)setInventario([{id:Date.now(),...rec},...inventario]);
    else setInventario(inventario.map(x=>x.id===modal.id?{id:modal.id,...rec}:x));
    setModal(null);setF(blank);
  };
  const del=(id)=>setConfirm({msg:'¿Eliminar este producto del inventario?',onOk:()=>{setInventario(inventario.filter(x=>x.id!==id));setConfirm(null);}});
  const total=inventario.reduce((s,i)=>s+i.existencia*i.costo,0);
  const exData=inventario.map(x=>({Producto:x.producto,SKU:x.sku,Categoría:x.categoria,Existencia:x.existencia,Mínimo:x.minimo,Costo:x.costo,Precio:x.precio,ValorTotal:x.existencia*x.costo}));
  return(
    <div>
      <div className="grid3" style={{marginBottom:18}}>
        <div className="stat-card"><div className="stat-label">Total productos</div><div className="stat-val">{inventario.length}</div></div>
        <div className="stat-card"><div className="stat-label">Valor inventario</div><div className="stat-val" style={{color:'var(--wine)',fontSize:18}}>{fmtMXN(total)}</div></div>
        <div className="stat-card"><div className="stat-label">Stock bajo</div><div className="stat-val" style={{color:'var(--red)'}}>{inventario.filter(i=>i.existencia<=i.minimo).length}</div></div>
      </div>
      <div className="table-wrap">
        <div className="table-toolbar">
          <button className="btn btn-wine" onClick={()=>{setF(blank);setModal({mode:'new'})}}>+ Nuevo producto</button>
          <button className="btn btn-ghost" onClick={()=>exportXLS(exData,'inventario')}>📊 Excel</button>
        </div>
        <table>
          <thead><tr><th>Producto</th><th>SKU</th><th>Categoría</th><th>Existencia</th><th>Mínimo</th><th>Costo</th><th>Precio</th><th>Estado</th><th>Acciones</th></tr></thead>
          <tbody>
            {inventario.map(x=>{
              const bajo=x.existencia<=x.minimo;
              const pct=x.minimo>0?Math.min(100,Math.round(x.existencia/x.minimo*100)):100;
              return(<tr key={x.id}>
                <td className="td-name">{x.producto}</td>
                <td style={{fontSize:11,color:'var(--text3)'}}>{x.sku}</td>
                <td>{x.categoria}</td>
                <td style={{fontWeight:600,color:bajo?'var(--red)':'var(--green)'}}>{x.existencia}</td>
                <td>{x.minimo}</td>
                <td className="td-mono">{fmtMXN(x.costo)}</td>
                <td className="td-mono">{fmtMXN(x.precio)}</td>
                <td>
                  <span className={`badge badge-${bajo?'red':'green'}`}>{bajo?'⚠️ Stock bajo':'✅ OK'}</span>
                  <div className="progress-bar" style={{width:80,marginTop:4}}>
                    <div className="progress-fill" style={{width:pct+'%',background:bajo?'var(--red)':'var(--green)'}}/>
                  </div>
                </td>
                <td><div className="inline-actions">
                  <button className="btn btn-ghost btn-xs" onClick={()=>{setF({...x});setModal({mode:'edit',id:x.id})}}>✏️</button>
                  <button className="btn btn-ghost btn-xs" onClick={()=>del(x.id)}>🗑</button>
                </div></td>
              </tr>);
            })}
          </tbody>
        </table>
      </div>
      {modal&&<div className="modal-overlay">
        <div className="modal">
          <div className="modal-head"><div className="modal-head-title">{isNew?'Nuevo Producto':'Editar Producto'}</div><button className="close-btn" onClick={()=>setModal(null)}>×</button></div>
          <div className="modal-body">
            <div className="grid2">
              <div className="form-group"><label className="form-label">Producto *</label><input className="form-input" value={f.producto} onChange={e=>setF({...f,producto:e.target.value})}/></div>
              <div className="form-group"><label className="form-label">SKU</label><input className="form-input" value={f.sku} onChange={e=>setF({...f,sku:e.target.value})}/></div>
            </div>
            <div className="form-group"><label className="form-label">Categoría</label>
              <select className="form-input" value={f.categoria} onChange={e=>setF({...f,categoria:e.target.value})}>
                {['Equipo','Periférico','Mobiliario','Consumible','Otro'].map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div className="grid2">
              <div className="form-group"><label className="form-label">Existencia</label><input className="form-input" type="number" value={f.existencia} onChange={e=>setF({...f,existencia:e.target.value})}/></div>
              <div className="form-group"><label className="form-label">Stock mínimo</label><input className="form-input" type="number" value={f.minimo} onChange={e=>setF({...f,minimo:e.target.value})}/></div>
            </div>
            <div className="grid2">
              <div className="form-group"><label className="form-label">Costo unitario</label><input className="form-input" type="number" value={f.costo} onChange={e=>setF({...f,costo:e.target.value})}/></div>
              <div className="form-group"><label className="form-label">Precio venta</label><input className="form-input" type="number" value={f.precio} onChange={e=>setF({...f,precio:e.target.value})}/></div>
            </div>
          </div>
          <div className="modal-foot">
            <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancelar</button>
            <button className="btn btn-wine" onClick={save}>Guardar</button>
          </div>
        </div>
      </div>}
      {confirm&&<ConfirmDialog title="Confirmar eliminación" desc={confirm.msg} onConfirm={confirm.onOk} onCancel={()=>setConfirm(null)}/>}
    </div>
  );
}

/* ─── EMPLEADOS / NÓMINA ─── */
function RRHHModule({empleados,setEmpleados,nomina,setNomina}){
  const [tab,setTab]=useState('empleados');
  const [modal,setModal]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const blankE={nombre:'',puesto:'',depto:'Ventas',salario:'',ingreso:today(),activo:true,files:[]};
  const blankN={empleado:'',periodo:'',salario:'',deducciones:'',neto:'',estado:'Pendiente',fecha:today()};
  const [fE,setFE]=useState(blankE);
  const [fN,setFN]=useState(blankN);
  const isNew=modal?.mode==='new';

  const saveEmp=()=>{
    const rec={...fE,salario:Number(fE.salario)||0};
    if(isNew)setEmpleados([{id:Date.now(),...rec},...empleados]);
    else setEmpleados(empleados.map(x=>x.id===modal.id?{id:modal.id,...rec}:x));
    setModal(null);
  };
  const saveNom=()=>{
    const sal=Number(fN.salario)||0;const ded=Number(fN.deducciones)||0;
    const rec={...fN,salario:sal,deducciones:ded,neto:sal-ded};
    if(isNew)setNomina([{id:Date.now(),...rec},...nomina]);
    else setNomina(nomina.map(x=>x.id===modal.id?{id:modal.id,...rec}:x));
    setModal(null);
  };
  const del=(id,type)=>setConfirm({msg:`¿Eliminar este ${type}?`,onOk:()=>{
    if(type==='empleado')setEmpleados(empleados.filter(x=>x.id!==id));
    else setNomina(nomina.filter(x=>x.id!==id));
    setConfirm(null);
  }});

  const exE=empleados.map(x=>({Nombre:x.nombre,Puesto:x.puesto,Depto:x.depto,Salario:x.salario,Ingreso:x.ingreso,Activo:x.activo?'Sí':'No'}));
  const exN=nomina.map(x=>({Empleado:x.empleado,Periodo:x.periodo,Salario:x.salario,Deducciones:x.deducciones,Neto:x.neto,Estado:x.estado,Fecha:x.fecha}));

  return(
    <div>
      <div className="tabs">

            <button className="btn btn-wine" onClick={()=>{setFE(blankE);setModal({mode:'new',type:'emp'})}}>+ Nuevo empleado</button>

          </div>
          <table>
            <thead><tr><th>Nombre</th><th>Puesto</th><th>Depto</th><th>Salario</th><th>Ingreso</th><th>Estado</th><th>Docs</th><th>Acciones</th></tr></thead>
            <tbody>
              {empleados.map(x=>(
                <tr key={x.id}>
                  <td className="td-name">{x.nombre}</td>
                  <td>{x.puesto}</td>
                  <td>{x.depto}</td>
                  <td className="td-mono">{fmtMXN(x.salario)}</td>
                  <td>{x.ingreso}</td>
                  <td><span className={`badge badge-${x.activo?'green':'gray'}`}>{x.activo?'Activo':'Inactivo'}</span></td>
                  <td style={{fontSize:12}}>{x.files?.length>0?`📎 ${x.files.length}`:'—'}</td>
                  <td><div className="inline-actions">
                    <button className="btn btn-ghost btn-xs" onClick={()=>{setFE({...x});setModal({mode:'edit',id:x.id,type:'emp'})}}>✏️</button>
                    <button className="btn btn-ghost btn-xs" onClick={()=>del(x.id,'empleado')}>🗑</button>

/* ─── PROVEEDORES ─── */
function ProveedoresModule({proveedores,setProveedores}){
  const [modal,setModal]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const blank={nombre:'',contacto:'',email:'',tel:'',ciudad:'',rfc:'',files:[]};
  const [f,setF]=useState(blank);
  const isNew=modal?.mode==='new';
  const save=()=>{
    if(!f.nombre)return;
    if(isNew)setProveedores([{id:Date.now(),...f},...proveedores]);
    else setProveedores(proveedores.map(x=>x.id===modal.id?{id:modal.id,...f}:x));
    setModal(null);setF(blank);
  };
  const del=(id)=>setConfirm({msg:'¿Eliminar este proveedor?',onOk:()=>{setProveedores(proveedores.filter(x=>x.id!==id));setConfirm(null);}});
  const exData=proveedores.map(x=>({Nombre:x.nombre,Contacto:x.contacto,Email:x.email,Tel:x.tel,Ciudad:x.ciudad,RFC:x.rfc}));
  return(
    <div>
      <div className="table-wrap">
        <div className="table-toolbar">
          <button className="btn btn-wine" onClick={()=>{setF(blank);setModal({mode:'new'})}}>+ Nuevo proveedor</button>
          <button className="btn btn-ghost" onClick={()=>exportXLS(exData,'proveedores')}>📊 Excel</button>
        </div>
        <table>
          <thead><tr><th>Nombre</th><th>Contacto</th><th>Email</th><th>Tel</th><th>Ciudad</th><th>RFC</th><th>Docs</th><th>Acciones</th></tr></thead>
          <tbody>
            {proveedores.map(x=>(
              <tr key={x.id}>
                <td className="td-name">{x.nombre}</td>
                <td>{x.contacto}</td>
                <td style={{color:'var(--blue)',fontSize:12}}>{x.email}</td>
                <td>{x.tel}</td>
                <td>{x.ciudad}</td>
                <td style={{fontSize:11,color:'var(--text3)'}}>{x.rfc}</td>
                <td style={{fontSize:12}}>{x.files?.length>0?`📎 ${x.files.length}`:'—'}</td>
                <td><div className="inline-actions">
                  <button className="btn btn-ghost btn-xs" onClick={()=>{setF({...x});setModal({mode:'edit',id:x.id})}}>✏️</button>
                  <button className="btn btn-ghost btn-xs" onClick={()=>del(x.id)}>🗑</button>

              <div className="form-group"><label className="form-label">RFC</label><input className="form-input" value={f.rfc} onChange={e=>setF({...f,rfc:e.target.value})}/></div>
            </div>
            <div className="grid2">
              <div className="form-group"><label className="form-label">Contacto</label><input className="form-input" value={f.contacto} onChange={e=>setF({...f,contacto:e.target.value})}/></div>
              <div className="form-group"><label className="form-label">Teléfono</label><input className="form-input" value={f.tel} onChange={e=>setF({...f,tel:e.target.value})}/></div>

/* ─── CONFIGURACIÓN ─── */
function ConfigModule({roles,setRoles,users,setUsers,cu}){
  const [tab,setTab]=useState('roles');
  const [modal,setModal]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const blankR={name:'',slug:'',color:'blue',perms:[]};
  const blankU={name:'',email:'',role:'',slug:'',avatar:'',active:true};
  const [fR,setFR]=useState(blankR);
  const [fU,setFU]=useState(blankU);
  const isNew=modal?.mode==='new';
  const saveRol=()=>{
    if(!fR.name)return;
    const slug=fR.slug||fR.name.toLowerCase().replace(/\s/g,'-');
    if(isNew)setRoles([...roles,{id:Date.now(),...fR,slug}]);
    else setRoles(roles.map(x=>x.id===modal.id?{id:modal.id,...fR,slug}:x));
    setModal(null);setFR(blankR);
  };
  const saveUser=()=>{
    if(!fU.name||!fU.role)return;
    const av=fU.avatar||fU.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const slug=roles.find(r=>r.name===fU.role)?.slug||'';
    if(isNew)setUsers([...users,{id:Date.now(),...fU,avatar:av,slug}]);
    else setUsers(users.map(x=>x.id===modal.id?{id:modal.id,...fU,avatar:av,slug}:x));
    setModal(null);setFU(blankU);
  };
  const delRol=(id)=>setConfirm({msg:'¿Eliminar este rol?',onOk:()=>{setRoles(roles.filter(x=>x.id!==id));setConfirm(null);}});
  const delUser=(id)=>setConfirm({msg:'¿Eliminar este usuario?',onOk:()=>{setUsers(users.filter(x=>x.id!==id));setConfirm(null);}});
  const roleColors={wine:'#7B1C2E',blue:'#1A5FAA',green:'#1A7A4A',amber:'#B8660A',gray:'#5A6480',purple:'#6B3FA0'};

  return(
    <div>
      <div className="tabs">
        {['roles','usuarios'].map(t=><div key={t} className={'tab-item'+(tab===t?' active':'')} onClick={()=>setTab(t)} style={{textTransform:'capitalize'}}>{t}</div>)}
      </div>

      {tab==='roles'&&<>
        <div className="table-wrap">
          <div className="table-toolbar">
            <button className="btn btn-wine" onClick={()=>{setFR(blankR);setModal({mode:'new',type:'rol'})}}>+ Nuevo rol</button>
          </div>
          <table>
            <thead><tr><th>Rol</th><th>Slug</th><th>Permisos</th><th>Usuarios</th><th>Acciones</th></tr></thead>
            <tbody>
              {roles.map(r=>(
                <tr key={r.id}>
                  <td><span className="badge" style={{background:roleColors[r.color]+'22',color:roleColors[r.color]||'var(--text2)'}}>{r.name}</span></td>
                  <td style={{fontSize:11,fontFamily:'monospace',color:'var(--text3)'}}>{r.slug}</td>
                  <td><div style={{display:'flex',flexWrap:'wrap',gap:3}}>{r.perms.map(p=><span key={p} className="badge badge-gray" style={{fontSize:10}}>{p}</span>)}</div></td>
                  <td>{users.filter(u=>u.slug===r.slug).length}</td>
                  <td><div className="inline-actions">
                    <button className="btn btn-ghost btn-xs" onClick={()=>{setFR({...r});setModal({mode:'edit',id:r.id,type:'rol'})}}>✏️</button>
                    <button className="btn btn-ghost btn-xs" onClick={()=>delRol(r.id)}>🗑</button>
                  </div></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </>}

      {tab==='usuarios'&&<>
        <div className="table-wrap">
          <div className="table-toolbar">
            <button className="btn btn-wine" onClick={()=>{setFU(blankU);setModal({mode:'new',type:'user'})}}>+ Nuevo usuario</button>
          </div>
          <table>
            <thead><tr><th>Usuario</th><th>Email</th><th>Rol</th><th>Estado</th><th>Acciones</th></tr></thead>
            <tbody>
              {users.map(u=>(
                <tr key={u.id}>
                  <td><div style={{display:'flex',alignItems:'center',gap:9}}>
                    <div className="user-av" style={{width:30,height:30,fontSize:10,borderColor:'var(--border)'}}>{u.avatar}</div>
                    <span className="td-name">{u.name}</span>
                  </div></td>
                  <td style={{fontSize:12,color:'var(--text3)'}}>{u.email}</td>
                  <td><span className="badge badge-wine">{u.role}</span></td>
                  <td><span className={`badge badge-${u.active?'green':'gray'}`}>{u.active?'Activo':'Inactivo'}</span></td>
                  <td><div className="inline-actions">
                    <button className="btn btn-ghost btn-xs" onClick={()=>{setFU({...u});setModal({mode:'edit',id:u.id,type:'user'})}}>✏️</button>
                    <button className="btn btn-ghost btn-xs" onClick={()=>delUser(u.id)}>🗑</button>
                  </div></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </>}

      {modal?.type==='rol'&&<div className="modal-overlay">
        <div className="modal">
          <div className="modal-head"><div className="modal-head-title">{isNew?'Nuevo Rol':'Editar Rol'}</div><button className="close-btn" onClick={()=>setModal(null)}>×</button></div>
          <div className="modal-body">
            <div className="grid2">
              <div className="form-group"><label className="form-label">Nombre del rol *</label><input className="form-input" value={fR.name} onChange={e=>setFR({...fR,name:e.target.value})}/></div>
              <div className="form-group"><label className="form-label">Color</label>
                <select className="form-input" value={fR.color} onChange={e=>setFR({...fR,color:e.target.value})}>
                  {Object.keys(roleColors).map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
            </div>
            <div className="form-group"><label className="form-label">Permisos</label>
              <div style={{display:'flex',flexWrap:'wrap',gap:10,marginTop:6}}>
                {ALL_PERMS.map(p=>(
                  <label key={p} style={{display:'flex',alignItems:'center',gap:5,cursor:'pointer',fontSize:12.5,color:'var(--text2)'}}>
                    <input type="checkbox" checked={fR.perms.includes(p)} onChange={()=>setFR(r=>({...r,perms:r.perms.includes(p)?r.perms.filter(x=>x!==p):[...r.perms,p]}))} style={{accentColor:'var(--wine)'}}/>
                    {p}
                  </label>
                ))}
              </div>
            </div>
          </div>
          <div className="modal-foot">
            <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancelar</button>
            <button className="btn btn-wine" onClick={saveRol}>Guardar</button>
          </div>
        </div>
      </div>}

      {modal?.type==='user'&&<div className="modal-overlay">
        <div className="modal">
          <div className="modal-head"><div className="modal-head-title">{isNew?'Nuevo Usuario':'Editar Usuario'}</div><button className="close-btn" onClick={()=>setModal(null)}>×</button></div>
          <div className="modal-body">
            <div className="grid2">
              <div className="form-group"><label className="form-label">Nombre completo *</label><input className="form-input" value={fU.name} onChange={e=>setFU({...fU,name:e.target.value})}/></div>
              <div className="form-group"><label className="form-label">Email</label><input className="form-input" type="email" value={fU.email} onChange={e=>setFU({...fU,email:e.target.value})}/></div>
            </div>
            <div className="grid2">
              <div className="form-group"><label className="form-label">Rol *</label>
                <select className="form-input" value={fU.role} onChange={e=>setFU({...fU,role:e.target.value})}>
                  <option value="">Seleccionar...</option>
                  {roles.map(r=><option key={r.id}>{r.name}</option>)}
                </select>
              </div>
              <div className="form-group"><label className="form-label">Estado</label>
                <select className="form-input" value={fU.active} onChange={e=>setFU({...fU,active:e.target.value==='true'})}>
                  <option value="true">Activo</option><option value="false">Inactivo</option>
                </select>
              </div>
            </div>
          </div>
          <div className="modal-foot">
            <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancelar</button>
            <button className="btn btn-wine" onClick={saveUser}>Guardar</button>
          </div>
        </div>
      </div>}

      {confirm&&<ConfirmDialog title="Confirmar eliminación" desc={confirm.msg} onConfirm={confirm.onOk} onCancel={()=>setConfirm(null)}/>}
    </div>
  );
}

              </button>
            </div>
            <div style={{fontSize:12,color:'var(--text3)',padding:'0 4px',borderLeft:'1px solid var(--border)',marginLeft:4,paddingLeft:12}}>
              <div style={{fontWeight:500,color:'var(--text)'}}>{cu?.name}</div>
              <div style={{fontSize:11}}>{cu?.role}</div>
            </div>
          </div>
        </div>

        <div className="content">
          {page==='dashboard'&&<Dashboard cu={cu} gastos={gastos} compras={compras} cobros={cobros} clientes={clientes} inventario={inventario} facturas={facturas} actividades={actividades}/>}
          {page==='crm'&&<CRMModule clientes={clientes} setClientes={setClientes} actividades={actividades} setActividades={setActividades} cu={cu}/>}
          {page==='finanzas'&&<FinanzasModule gastos={gastos} setGastos={setGastos} compras={compras} setCompras={setCompras} cobros={cobros} setCobros={setCobros} facturas={facturas} setFacturas={setFacturas} pagos={pagos} setPagos={setPagos} cu={cu} addNotif={addNotif} defaultTab={finTab}/>}
          {page==='proveedores'&&<ProveedoresModule proveedores={proveedores} setProveedores={setProveedores}/>}
          {page==='inventario'&&<InventarioModule inventario={inventario} setInventario={setInventario}/>}
          {page==='rrhh'&&<RRHHModule empleados={empleados} setEmpleados={setEmpleados} nomina={nomina} setNomina={setNomina}/>}
          {page==='config'&&<ConfigModule roles={roles} setRoles={setRoles} users={users} setUsers={setUsers} cu={cu}/>}
        </div>
      </div>

      <NotifPanel
        open={notifOpen} onClose={()=>setNotifOpen(false)}
        notifs={notifs} setNotifs={setNotifs} currentUser={cu}
        onNavigate={handleNavigate}
        gastos={gastos} compras={compras} pagos={pagos}
        facturas={facturas} inventario={inventario}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
